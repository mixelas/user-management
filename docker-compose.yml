services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: user-management-app
    container_name: user-management-app
    restart: unless-stopped
    working_dir: /var/www/html
    command: sh -c "if [ ! -f vendor/autoload.php ]; then composer install --no-interaction --no-progress --prefer-dist; fi && php-fpm"
    volumes:
      - ./:/var/www/html
      - vendor:/var/www/html/vendor
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: user_management
      DB_USERNAME: user_management
      DB_PASSWORD: secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network

  nginx:
    image: nginx:1.27-alpine
    container_name: user-management-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - app-network

  mysql:
    image: mysql:8.0
    container_name: user-management-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: user_management
      MYSQL_USER: user_management
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: user-management-redis
    restart: unless-stopped
    profiles:
      - redis
    ports:
      - "6379:6379"
    networks:
      - app-network

volumes:
  mysql-data:
  vendor:

networks:
  app-network:
    driver: bridge